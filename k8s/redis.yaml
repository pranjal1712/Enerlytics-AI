apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: energy-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        emptyDir: {} # For production, use a PersistentVolumeClaim
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: energy-rag
spec:
  selector:
    app: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
